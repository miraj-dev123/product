<!DOCTYPE html>
<html>
<head>
  <title>Product Calculator</title>
</head>
<body>
  <label for="a">Enter first number :</label>
  <input type="number" id="a" step="any" />
  <br/>
  <label for="b">Enter second number :</label>
  <input type="number" id="b" step="any" />
  <br/>
  <button onclick="calculate()">Calculate</button>
  <p id="result"></p>

  <script>
    function calculate() {
      const aStr = document.getElementById('a').value;
      const bStr = document.getElementById('b').value;
      const a = parseFloat(aStr);
      const b = parseFloat(bStr);
      if (isNaN(a) || isNaN(b)) {
        document.getElementById('result').textContent = 'Please enter valid numbers.';
        return;
      }
      const c = a * b;
      document.getElementById('result').textContent = `The product of ${a} and ${b} is ${c} `;
    }
  </script>
</body>
</html>
